<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1920px;
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(180deg, #1a2332 0%, #1a2332 22%, #f5f5f5 22%, #f5f5f5 78%, #1a2332 78%, #1a2332 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  
  .top-section {
    width: 100%;
    height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 40px;
  }
  
  .top-section .logo {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
  }
  
  .top-section h1 {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 12px;
    font-family: 'Heebo', sans-serif;
  }
  
  .top-section .subtitle {
    font-size: 38px;
    color: #b0bec5;
    font-weight: 400;
  }
  
  .image-section {
    width: 1000px;
    height: 1000px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  
  .image-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .bottom-section {
    width: 100%;
    height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    gap: 16px;
  }
  
  .brand {
    font-size: 52px;
    font-weight: 900;
    color: white;
  }
  
  .cta-btn {
    background: #4CAF50;
    color: white;
    padding: 16px 48px;
    border-radius: 50px;
    font-size: 36px;
    font-weight: 700;
  }
  
  .tagline {
    font-size: 30px;
    color: #90a4ae;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="top-section">
    <h1>SHOP THE LOOK</h1>
    <div class="subtitle">אהבת משהו בהדמיה? קנה בלחיצה</div>
  </div>
  
  <div class="image-section">
    <img src="shop-the-look-original.jpg" />
  </div>
  
  <div class="bottom-section">
    <div class="brand">שיפוץ-AI</div>
    <div class="cta-btn">התחילו בחינם ←</div>
    <div class="tagline">הדמיה • זיהוי מוצרים • רכישה</div>
  </div>
</body>
</html>
